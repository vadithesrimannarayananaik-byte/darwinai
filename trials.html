<!DOCTYPE html>
<html>
<head>
    <title>Clinical Trials - DarwinAI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="patients.html">Patients</a>
    <a href="trials.html">Trials</a>
    <a href="matches.html">Matches</a>
</nav>

<h1>🧪 Clinical Trials</h1>

<!-- Manual Add Form -->
<form id="trialForm">
    <label>Trial Name</label><br>
    <input type="text" id="trial_name"><br><br>
    <label>Disease</label><br>
    <input type="text" id="disease"><br><br>
    <label>Location</label><br>
    <input type="text" id="location"><br><br>
    <button type="submit">Add Trial</button>
</form>

<hr>

<!-- ClinicalTrials.gov Search -->
<h2>🔍 Search ClinicalTrials.gov</h2>
<input type="text" id="searchDisease" placeholder="Enter disease (e.g. diabetes)">
<button onclick="searchTrials()">Search</button>
<div id="searchResults"></div>

<hr>

<h2>📋 My Trial List</h2>
<div id="trialsList"></div>

<script>
const supabaseUrl = 'https://owvnrbtlouluskgasjxd.supabase.co';
const supabaseKey = 'sb_publishable_yoSS1S5amSn7oOL7sEx-mA_-LjZMrIU';
const client = supabase.createClient(supabaseUrl, supabaseKey);

// Search ClinicalTrials.gov
async function searchTrials() {
    const disease = document.getElementById('searchDisease').value || 'diabetes';
    const resultsDiv = document.getElementById('searchResults');
    resultsDiv.innerHTML = '<p>Loading...</p>';

    try {
        const url = `https://clinicaltrials.gov/api/v2/studies?query.term=${encodeURIComponent(disease)}&pageSize=5`;
        
        const response = await fetch(url, {
            headers: { "Accept": "application/json" }
        });

        if (!response.ok) {
            resultsDiv.innerHTML = `<p style="color:red">Error: ${response.status}</p>`;
            return;
        }

        const data = await response.json();
        const studies = data.studies || [];

        if (studies.length === 0) {
            resultsDiv.innerHTML = '<p>No trials found.</p>';
            return;
        }

        let html = '';
        studies.forEach(study => {
            const info = study.protocolSection?.identificationModule;
            const status = study.protocolSection?.statusModule;
            const conditions = study.protocolSection?.conditionsModule?.conditions || [];

            html += `
                <div class="card">
                    <h3>${info?.briefTitle || 'No Title'}</h3>
                    <p><strong>Status:</strong> ${status?.overallStatus || 'Unknown'}</p>
                    <p><strong>ID:</strong> ${info?.nctId || 'N/A'}</p>
                    <p><strong>Conditions:</strong> ${conditions.join(', ') || 'N/A'}</p>
                    <button onclick="saveToSupabase(
                        '${(info?.briefTitle || '').replace(/'/g, '').replace(/"/g, '')}',
                        '${disease}'
                    )">+ Save to My Trials</button>
                </div>
            `;
        });

        resultsDiv.innerHTML = html;

    } catch (err) {
        resultsDiv.innerHTML = `<p style="color:red">Failed: ${err.message}</p>`;
    }
}

// Save trial to Supabase
async function saveToSupabase(trialName, disease) {
    const { error } = await client
        .from('clinical_trials')
        .insert([{ 
            trial_name: trialName, 
            disease: disease, 
            location: 'N/A' 
        }]);

    if (error) {
        alert('Error saving trial: ' + error.message);
    } else {
        alert('✅ Trial saved!');
        loadTrials();
    }
}

// Load trials from Supabase
async function loadTrials() {
    const { data: trials, error } = await client
        .from('clinical_trials')
        .select('*');

    if (error) {
        document.getElementById('trialsList').innerHTML = 
            `<p style="color:red">Error loading trials: ${error.message}</p>`;
        return;
    }

    let html = '';
    trials.forEach(trial => {
        html += `
            <div class="card">
                <h3>${trial.trial_name}</h3>
                <p><strong>Disease:</strong> ${trial.disease}</p>
                <p><strong>Location:</strong> ${trial.location}</p>
            </div>
        `;
    });

    document.getElementById('trialsList').innerHTML = 
        html || '<p>No trials saved yet.</p>';
}

loadTrials();

// Manual add form
document.getElementById('trialForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const trial_name = document.getElementById('trial_name').value;
    const disease = document.getElementById('disease').value;
    const location = document.getElementById('location').value;

    const { error } = await client
        .from('clinical_trials')
        .insert([{ trial_name, disease, location }]);

    if (error) {
        alert('Error adding trial: ' + error.message);
    } else {
        alert('✅ Trial added successfully');
        loadTrials();
    }
});
</script>

</body>
</html>
