<!DOCTYPE html>
<html>
<head>
    <title>Clinical Trials - DarwinAI</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="patients.html">Patients</a>
    <a href="trials.html">Trials</a>
    <a href="matches.html">Matches</a>
</nav>

<h1>🧪 Clinical Trials</h1>

<form id="trialForm">

    <label>Trial Name</label><br>
    <input type="text" id="trial_name"><br><br>

    <label>Disease</label><br>
    <input type="text" id="disease"><br><br>

    <label>Location</label><br>
    <input type="text" id="location"><br><br>

    <button type="submit">Add Trial</button>

</form>

<hr>

<h2>Trial List</h2>

<div id="trialsList"></div>

<script>

const supabaseUrl =
'https://owvnrbtlouluskgasjxd.supabase.co';

const supabaseKey =
'sb_publishable_yoSS1S5amSn7oOL7sEx-mA_-LjZMrIU';

const client =
supabase.createClient(
    supabaseUrl,
    supabaseKey
);

async function loadTrials(){

    const { data: trials } =
    await client
    .from('clinical_trials')
    .select('*');

    let html = '';

    trials.forEach(trial => {

        html += `
            <div class="card">

                <h3>${trial.trial_name}</h3>

                <p>Disease: ${trial.disease}</p>

                <p>Location: ${trial.location}</p>

            </div>
        `;

    });

    document
    .getElementById('trialsList')
    .innerHTML = html;

}

loadTrials();

document
.getElementById('trialForm')
.addEventListener('submit', async (e) => {

    e.preventDefault();

    const trial_name =
    document.getElementById('trial_name').value;

    const disease =
    document.getElementById('disease').value;

    const location =
    document.getElementById('location').value;

    const { data, error } =
    await client
    .from('clinical_trials')
    .insert([
        {
            trial_name: trial_name,
            disease: disease,
            location: location
        }
    ]);

    if(error){

        alert('Error adding trial');

    } else {

        alert('Trial added successfully');

        loadTrials();

    }

});

</script>

</body>
</html>
