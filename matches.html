<!DOCTYPE html>
<html>
<head>
    <title>AI Matches - DarwinAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="patients.html">Patients</a>
    <a href="trials.html">Trials</a>
    <a href="matches.html">Matches</a>
</nav>

<h1>🧠 AI Trial Matching</h1>

<input type="text" id="patientDisease" placeholder="Enter patient disease">
<button onclick="findMatches()">Find Matches</button>

<div id="results"></div>

<script>

const trialDatabase = [
    {
        title: "Type 2 Diabetes Treatment Study",
        disease: "diabetes"
    },
    {
        title: "Cancer Immunotherapy Trial",
        disease: "cancer"
    },
    {
        title: "Heart Disease Prevention Study",
        disease: "heart disease"
    }
];

function findMatches() {

    const patientDisease =
        document.getElementById("patientDisease")
        .value
        .toLowerCase();

    let html = "";

    trialDatabase.forEach(trial => {

        let score = 0;

        if (
            patientDisease.includes(trial.disease)
            ||
            trial.disease.includes(patientDisease)
        ) {
            score = 95;
        } else {
            score = 20;
        }

        html += `
            <div class="card">
                <h3>${trial.title}</h3>
                <p><strong>Disease:</strong> ${trial.disease}</p>
                <p><strong>AI Match Score:</strong> ${score}%</p>
            </div>
        `;
    });

    document.getElementById("results").innerHTML = html;
}

</script>

</body>
</html>
