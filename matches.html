<!DOCTYPE html>
<html>
<head>
    <title>Match Results - DarwinAI</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="patients.html">Patients</a>
    <a href="trials.html">Trials</a>
    <a href="matches.html">Matches</a>
</nav>

<h1>🎯 Match Results</h1>

<div id="results"></div>

<script>

const supabaseUrl =
'https://owvnrbtlouluskgasjxd.supabase.co';

const supabaseKey =
'sb_publishable_yoSS1S5amSn7oOL7sEx-mA_-LjZMrIU';

const client =
supabase.createClient(
    supabaseUrl,
    supabaseKey
);

async function loadMatches(){

    const { data: patients } =
    await client
    .from('patients')
    .select('*');

    const { data: trials } =
    await client
    .from('clinical_trials')
    .select('*');

    let html = '';

    patients.forEach(patient => {

        trials.forEach(trial => {

            if(patient.disease === trial.disease){

                html += `
                    <div class="card">

                        <h3>
                            ${patient.name}
                        </h3>

                        <p>
                            Matched with:
                            ${trial.trial_name}
                        </p>

                        <p>
                            Disease:
                            ${patient.disease}
                        </p>

                    </div>
                `;

            }

        });

    });

    document
    .getElementById('results')
    .innerHTML = html;

}

loadMatches();

</script>

</body>
</html>
