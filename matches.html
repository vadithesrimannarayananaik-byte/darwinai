<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseUrl = 'https://owvnrbtlouluskgasjxd.supabase.co';

const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';

const client = supabase.createClient(
    supabaseUrl,
    supabaseKey
);

async function saveMatch(title, nctId, score, disease) {

    const { error } = await client
        .from('matches')
        .insert([{
            trial_title: title,
            nct_id: nctId,
            score: score,
            disease: disease
        }]);

    if (error) {

        alert('Error saving match');

    } else {

        alert('✅ Match saved successfully');

    }

}

async function findMatches() {

    const disease  =
        document.getElementById('patientDisease')
        .value
        .trim();

    const age =
        parseInt(
            document.getElementById('patientAge').value
        ) || null;

    const location =
        document.getElementById('patientLocation')
        .value
        .trim()
        .toLowerCase();

    const sex =
        document.getElementById('patientSex').value;

    const resultsDiv =
        document.getElementById('results');

    const summaryDiv =
        document.getElementById('summary');

    if (!disease) {

        alert('Please enter a disease');

        return;
    }

    resultsDiv.innerHTML =
        '<p>⏳ Fetching trials...</p>';

    summaryDiv.innerHTML = '';

    try {

        const url =
`https://clinicaltrials.gov/api/v2/studies?query.term=${encodeURIComponent(disease)}&pageSize=10`;

        const response =
            await fetch(url, {
                headers: {
                    "Accept": "application/json"
                }
            });

        const data =
            await response.json();

        const studies =
            data.studies || [];

        if (studies.length === 0) {

            resultsDiv.innerHTML =
                '<p>No trials found.</p>';

            return;
        }

        const scored = studies.map(study => {

            const info =
                study.protocolSection
                ?.identificationModule;

            const statusMod =
                study.protocolSection
                ?.statusModule;

            const eligibility =
                study.protocolSection
                ?.eligibilityModule;

            const conditions =
                study.protocolSection
                ?.conditionsModule
                ?.conditions || [];

            const locations =
                study.protocolSection
                ?.contactsLocationsModule
                ?.locations || [];

            const title =
                info?.briefTitle || 'No Title';

            const nctId =
                info?.nctId || 'N/A';

            const status =
                statusMod?.overallStatus || 'Unknown';

            const minAge =
                parseInt(
                    eligibility?.minimumAge
                ) || 0;

            const maxAge =
                parseInt(
                    eligibility?.maximumAge
                ) || 999;

            const trialSex =
                eligibility?.sex || 'ALL';

            let score = 0;

            let reasons = [];

            const titleLower =
                title.toLowerCase();

            const conditionStr =
                conditions.join(' ')
                .toLowerCase();

            const diseaseLower =
                disease.toLowerCase();

            if (
                titleLower.includes(diseaseLower)
                ||
                conditionStr.includes(diseaseLower)
            ) {

                score += 50;

                reasons.push(
                    '✅ Disease matches'
                );

            } else {

                score += 10;

                reasons.push(
                    '⚠️ Partial disease match'
                );

            }

            if (status === 'RECRUITING') {

                score += 20;

                reasons.push(
                    '✅ Recruiting'
                );

            }

            if (age) {

                if (
                    age >= minAge
                    &&
                    age <= maxAge
                ) {

                    score += 20;

                    reasons.push(
                        '✅ Age eligible'
                    );

                } else {

                    score -= 20;

                    reasons.push(
                        '❌ Age not eligible'
                    );

                }
            }

            if (
                sex
                &&
                trialSex !== 'ALL'
                &&
                trialSex !== sex
            ) {

                score -= 30;

                reasons.push(
                    '❌ Sex not eligible'
                );

            } else if (sex) {

                score += 10;

                reasons.push(
                    '✅ Sex eligible'
                );

            }

            if (location) {

                const locationMatch =
                    locations.some(loc =>
                        (loc.city || '')
                        .toLowerCase()
                        .includes(location)
                    );

                if (locationMatch) {

                    score += 10;

                    reasons.push(
                        '✅ Location nearby'
                    );

                }
            }

            score =
                Math.max(
                    0,
                    Math.min(100, score)
                );

            return {
                title,
                nctId,
                status,
                score,
                reasons,
                conditions
            };

        });

        scored.sort(
            (a, b) => b.score - a.score
        );

        summaryDiv.innerHTML = `
            <div class="card">
                <p>
                    📊 Found
                    <strong>${scored.length}</strong>
                    trials
                </p>
            </div>
        `;

        let html = '';

        scored.forEach(match => {

            html += `
                <div class="card">

                    <h3>${match.title}</h3>

                    <p>
                        <strong>NCT ID:</strong>
                        ${match.nctId}
                    </p>

                    <p>
                        <strong>Status:</strong>
                        ${match.status}
                    </p>

                    <p>
                        <strong>Match Score:</strong>
                        ${match.score}%
                    </p>

                    <details>
                        <summary>
                            Why this score?
                        </summary>

                        <ul>
                            ${match.reasons.map(
                                r => `<li>${r}</li>`
                            ).join('')}
                        </ul>

                    </details>

                    <br>

                    <a href="
https://clinicaltrials.gov/study/${match.nctId}
" target="_blank">

                        View Full Trial →

                    </a>

                    <br><br>

                    <button onclick="saveMatch(
                        '${match.title.replace(/'/g, "")}',
                        '${match.nctId}',
                        ${match.score},
                        '${disease}'
                    )">

                        💾 Save Match

                    </button>

                </div>
            `;
        });

        resultsDiv.innerHTML = html;

    } catch (err) {

        resultsDiv.innerHTML =
            `<p style="color:red">
                ❌ Error: ${err.message}
            </p>`;
    }
}

                </script>
