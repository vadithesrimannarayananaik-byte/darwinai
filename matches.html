const client =

);

async function saveMatch(
    title,
    nctId,
    score,
    disease
) {

    const { error } =
        await client
        .from('matches')
        .insert([{
            trial_title: title,
            nct_id: nctId,
            score: score,
            disease: disease
        }]);

    if (error) {

        alert(
            'Error saving match'
        );

    } else {

        alert(
            '✅ Match saved successfully'
        );

    }

}

async function findMatches() {

    const disease =
        document
        .getElementById('patientDisease')
        .value
        .trim();

    const resultsDiv =
        document
        .getElementById('results');

    if (!disease) {

        alert(
            'Please enter disease'
        );

        return;
    }

    resultsDiv.innerHTML =
        '<p>⏳ Fetching trials...</p>';

    try {

        const url =
`https://clinicaltrials.gov/api/v2/studies?query.term=${encodeURIComponent(disease)}&pageSize=10`;

        const response =
            await fetch(url, {
                headers: {
                    "Accept":
                    "application/json"
                }
            });

        const data =
            await response.json();

        const studies =
            data.studies || [];

        if (
            studies.length === 0
        ) {

            resultsDiv.innerHTML =
                '<p>No trials found.</p>';

            return;
        }

        let html = '';

        studies.forEach(study => {

            const info =
                study.protocolSection
                ?.identificationModule;

            const title =
                info?.briefTitle
                || 'No Title';

            const nctId =
                info?.nctId
                || 'N/A';

            let score = 50;

            if (
                title
                .toLowerCase()
                .includes(
                    disease.toLowerCase()
                )
            ) {

                score = 95;
            }

            html += `

                <div class="card">

                    <h3>${title}</h3>

                    <p>
                        <strong>NCT ID:</strong>
                        ${nctId}
                    </p>

                    <p>
                        <strong>AI Match Score:</strong>
                        ${score}%
                    </p>

                    <a href="
https://clinicaltrials.gov/study/${nctId}
"
target="_blank">

View Full Trial →

                    </a>

                    <br><br>

                    <button onclick="saveMatch(
                        '${title.replace(/'/g, "")}',
                        '${nctId}',
                        ${score},
                        '${disease}'
                    )">

                        💾 Save Match

                    </button>

                </div>
            `;
        });

        resultsDiv.innerHTML = html;

    } catch (err) {

        resultsDiv.innerHTML = `
            <p style="color:red">
                ❌ Error:
                ${err.message}
            </p>
        `;
    }
}

</script>
