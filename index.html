<!DOCTYPE html>
<html>
<head>
    <title>DarwinAI Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="patients.html">Patients</a>
    <a href="trials.html">Trials</a>
    <a href="matches.html">Matches</a>
</nav>

<h1>🧬 DarwinAI</h1>

<p>
AI-Powered Clinical Trial Matching Platform
</p>

<div class="card">
    <h3>Total Patients</h3>
    <p id="patientsCount">0</p>
</div>

<div class="card">
    <h3>Total Trials</h3>
    <p id="trialsCount">0</p>
</div>

<div class="card">
    <h3>Total Matches</h3>
    <p id="matchesCount">0</p>
</div>

<script>

const supabaseUrl =
'https://owvnrbtlouluskgasjxd.supabase.co';

const supabaseKey =
'sb_publishable_yoSS1S5amSn7oOL7sEx-mA_-LjZMrIU';

const client =
supabase.createClient(
    supabaseUrl,
    supabaseKey
);

async function loadDashboard(){

    const { data: patients } =
    await client
    .from('patients')
    .select('*');

    const { data: trials } =
    await client
    .from('clinical_trials')
    .select('*');

    let matches = 0;

    patients.forEach(patient => {

        trials.forEach(trial => {

            if(patient.disease === trial.disease){

                matches++;

            }

        });

    });

    document
    .getElementById('patientsCount')
    .innerText = patients.length;

    document
    .getElementById('trialsCount')
    .innerText = trials.length;

    document
    .getElementById('matchesCount')
    .innerText = matches;

}

loadDashboard();

</script>

</body>
</html>
