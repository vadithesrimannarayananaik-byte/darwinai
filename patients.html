<!DOCTYPE html>
<html>
<head>
    <title>Patients - DarwinAI</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="patients.html">Patients</a>
    <a href="trials.html">Trials</a>
    <a href="matches.html">Matches</a>
</nav>

<h1>👤 Patients</h1>

<form id="patientForm">

    <label>Name</label><br>
    <input type="text" id="name"><br><br>

    <label>Age</label><br>
    <input type="number" id="age"><br><br>

    <label>Disease</label><br>
    <input type="text" id="disease"><br><br>

    <button type="submit">Add Patient</button>

</form>

<hr>

<h2>Patient List</h2>

<div id="patientsList"></div>

<script>

const supabaseUrl =
'https://owvnrbtlouluskgasjxd.supabase.co';

const supabaseKey =
'sb_publishable_yoSS1S5amSn7oOL7sEx-mA_-LjZMrIU';

const client =
supabase.createClient(
    supabaseUrl,
    supabaseKey
);

async function loadPatients(){

    const { data: patients } =
    await client
    .from('patients')
    .select('*');

    let html = '';

    patients.forEach(patient => {

        html += `
            <div class="card">

                <h3>${patient.name}</h3>

                <p>Age: ${patient.age}</p>

                <p>Disease: ${patient.disease}</p>

                <button onclick="deletePatient(${patient.id})">
                    Delete
                </button>

            </div>
        `;

    });

    document
    .getElementById('patientsList')
    .innerHTML = html;

}

loadPatients();

async function deletePatient(id){

    const { error } =
    await client
    .from('patients')
    .delete()
    .eq('id', id);

    if(error){

        alert('Error deleting patient');

    } else {

        alert('Patient deleted');

        loadPatients();

    }

}

document
.getElementById('patientForm')
.addEventListener('submit', async (e) => {

    e.preventDefault();

    const name =
    document.getElementById('name').value;

    const age =
    document.getElementById('age').value;

    const disease =
    document.getElementById('disease').value;

    const { data, error } =
    await client
    .from('patients')
    .insert([
        {
            name: name,
            age: age,
            disease: disease
        }
    ]);

    if(error){

        alert('Error adding patient');

    } else {

        alert('Patient added successfully');

        loadPatients();

    }

});

</script>

</body>
</html>
